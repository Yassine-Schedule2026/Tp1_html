<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Emploi du temps</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background-color: white;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
        }

        th {
            background-color: #007BFF;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>

<body>

<h1>Mon emploi du temps</h1>

<table>
    <tr>
        <th>Jour</th>
        <th>08:00 - 10:00</th>
        <th>10:00 - 12:00</th>
        <th>14:00 - 16:00</th>
    </tr>

    <tr>
        <td>Lundi</td>
        <td>Math</td>
        <td>Informatique</td>
        <td>Physique</td>
    </tr>

    <tr>
        <td>Mardi</td>
        <td>Anglais</td>
        <td>Base de données</td>
        <td>Réseaux</td>
    </tr>

    <tr>
        <td>Mercredi</td>
        <td>Algorithmique</td>
        <td>Math</td>
        <td>-</td>
    </tr>

    <tr>
        <td>Jeudi</td>
        <td>Système</td>
        <td>Informatique</td>
        <td>Sport</td>
    </tr>

    <tr>
        <td>Vendredi</td>
        <td>Projet</td>
        <td>Anglais</td>
        <td>-</td>
    </tr>

</table>

</body>
</html>
